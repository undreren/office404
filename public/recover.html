<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e14" />
    <title>Office 404 — Save recovery</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0e14;
        color: #c8d4e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
        padding: 1.25rem;
        padding-top: max(1.25rem, env(safe-area-inset-top));
        padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      }
      main {
        max-width: 28rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.2rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: #6b7d99;
        font-size: 0.9rem;
      }
      label {
        display: block;
        margin: 1rem 0 0.35rem;
        font-size: 0.8rem;
        color: #6b7d99;
      }
      textarea {
        width: 100%;
        min-height: 7rem;
        background: #161d27;
        border: 1px solid #243044;
        border-radius: 8px;
        color: #c8d4e8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.72rem;
        padding: 0.75rem;
        resize: vertical;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      button,
      a.button {
        appearance: none;
        border: 1px solid #243044;
        border-radius: 8px;
        background: #161d27;
        color: #c8d4e8;
        font: inherit;
        font-size: 0.9rem;
        padding: 0.65rem 0.9rem;
        text-decoration: none;
        cursor: pointer;
      }
      button.primary,
      a.button.primary {
        background: #1f7a4f;
        border-color: #39d98a;
        color: #eafff4;
      }
      #status {
        margin-top: 1rem;
        min-height: 1.25rem;
        font-size: 0.85rem;
        color: #39d98a;
      }
      #status.error {
        color: #ff5c5c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Office 404 — Save recovery</h1>
      <p>
        This page does not load the game. It reads your save directly from this device’s browser
        storage so you can back up or restore after clearing cache.
      </p>

      <label for="export-code">Your save code</label>
      <textarea id="export-code" readonly placeholder="Tap Export to read save from this device…"></textarea>
      <div class="actions">
        <button type="button" class="primary" id="export-btn">Export save from this device</button>
        <button type="button" id="copy-btn">Copy code</button>
      </div>

      <label for="import-code">Import a save code</label>
      <textarea id="import-code" placeholder="Paste a previously exported save code…"></textarea>
      <div class="actions">
        <button type="button" class="primary" id="import-btn">Import to this device</button>
        <a class="button" id="play-link" href="./">Open game</a>
      </div>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
      ;(function () {
        var SAVE_KEY = 'office404-save-v8'
        var PREFIX = 'o404:v'
        var VERSION = 15

        var exportCode = document.getElementById('export-code')
        var importCode = document.getElementById('import-code')
        var status = document.getElementById('status')

        function setStatus(message, isError) {
          status.textContent = message
          status.className = isError ? 'error' : ''
        }

        function encodeExport(rawJson) {
          return PREFIX + VERSION + ':' + btoa(unescape(encodeURIComponent(rawJson)))
        }

        function decodeImport(code) {
          var trimmed = code.trim()
          if (!trimmed) return null
          var payload = trimmed.indexOf(PREFIX) === 0
            ? trimmed.slice(PREFIX.length).replace(/^\d+:/, '')
            : trimmed
          try {
            return JSON.parse(decodeURIComponent(escape(atob(payload))))
          } catch (e) {
            return null
          }
        }

        document.getElementById('export-btn').addEventListener('click', function () {
          var raw = localStorage.getItem(SAVE_KEY)
          if (!raw) {
            exportCode.value = ''
            setStatus('No save found in this browser for Office 404.', true)
            return
          }
          try {
            JSON.parse(raw)
          } catch (e) {
            setStatus('Save data looks corrupted.', true)
            return
          }
          exportCode.value = encodeExport(raw)
          setStatus('Save exported. Copy the code somewhere safe (Notes, email, etc.).')
        })

        document.getElementById('copy-btn').addEventListener('click', function () {
          if (!exportCode.value) {
            setStatus('Export a save first.', true)
            return
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(exportCode.value).then(function () {
              setStatus('Copied to clipboard.')
            }).catch(function () {
              exportCode.select()
              setStatus('Select the code and copy manually.')
            })
            return
          }
          exportCode.select()
          setStatus('Select the code and copy manually.')
        })

        document.getElementById('import-btn').addEventListener('click', function () {
          var parsed = decodeImport(importCode.value)
          if (!parsed || !parsed.state) {
            setStatus('Invalid save code — check the paste and try again.', true)
            return
          }
          localStorage.setItem(SAVE_KEY, JSON.stringify(parsed))
          setStatus('Save imported. Tap Open game.')
        })

        var raw = localStorage.getItem(SAVE_KEY)
        if (raw) {
          try {
            JSON.parse(raw)
            exportCode.value = encodeExport(raw)
            setStatus('Save found on this device — code loaded below. Copy it before clearing cache.')
          } catch (e) {
            setStatus('Save data found but could not be read.', true)
          }
        }
      })()
    </script>
  </body>
</html>
