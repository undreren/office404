<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="pwa-192.png" />
    <meta
      name="description"
      content="Office 404: Intelligence Not Found — a darkly comedic idle game about freelance AI agency chaos."
    />
    <title>Office 404: Intelligence Not Found</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0a0e14;
        color: #c8d4e8;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0e14;
        color: #6b7d99;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
        padding: 1.5rem;
      }

      .boot-splash__title {
        margin: 0;
        color: #c8d4e8;
        font-size: 1.15rem;
        letter-spacing: 0.04em;
      }

      .boot-splash__status {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.4;
        max-width: 18rem;
      }

      .boot-splash__spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid #243044;
        border-top-color: #39d98a;
        border-radius: 50%;
        animation: boot-spin 0.9s linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .boot-splash__recover {
        margin: 0.5rem 0 0;
        font-size: 0.8rem;
      }

      .boot-splash__recover a {
        color: #39d98a;
        text-decoration: underline;
        text-underline-offset: 0.15em;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-busy="true">
      <p class="boot-splash__title">Office 404</p>
      <div class="boot-splash__spinner" aria-hidden="true"></div>
      <p class="boot-splash__status">Loading…</p>
      <p class="boot-splash__recover">
        <a href="recover.html">Blank screen? Recover your save</a>
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
